name: JobTriageSafari
options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: '14.0'
settings:
  base:
    SWIFT_VERSION: '5.10'
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ''

targets:
  JobTriageSafari:
    type: application
    platform: macOS
    sources:
      - path: JobTriageSafariApp
    dependencies:
      - target: JobTriageSafariExtension
      - sdk: SafariServices.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arnavps.jobtriagesafari
        PRODUCT_NAME: JobTriageSafari
        INFOPLIST_FILE: JobTriageSafariApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        CODE_SIGN_ENTITLEMENTS: JobTriageSafariApp/JobTriageSafari.entitlements

  JobTriageSafariExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: JobTriageSafariExtension
    dependencies:
      - sdk: SafariServices.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arnavps.jobtriagesafari.Extension
        PRODUCT_NAME: JobTriageSafariExtension
        INFOPLIST_FILE: JobTriageSafariExtension/Info.plist
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: JobTriageSafariExtension/JobTriageSafariExtension.entitlements
